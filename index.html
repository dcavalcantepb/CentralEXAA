<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EXAA - Central Operacional</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

    <aside id="sidebar" class="expanded">

        <div class="sidebar-header">

            <button id="toggleSidebar" onclick="toggleSidebar()">
                ☰
            </button>

            <h2>Central Operacional</h2>

        </div>

        <div id="controlPanel">

            <label>Atos</label>

            <div class="number-control">

                <button onclick="changeValue('acts',-1,2,5)">−</button>

                <span id="acts">3</span>

                <button onclick="changeValue('acts',1,2,5)">+</button>

            </div>

            <label>Ameaças</label>

            <div class="number-control">

                <button onclick="changeValue('threats',-1,2,5)">−</button>

                <span id="threats">2</span>

                <button onclick="changeValue('threats',1,2,5)">+</button>

            </div>

            <label>Sucessos por Ato</label>

            <div class="number-control">

                <button onclick="changeValue('successes',-1,1,10)">−</button>

                <span id="successes">5</span>

                <button onclick="changeValue('successes',1,1,10)">+</button>

            </div>

            <label>Falhas por Ato</label>

            <div class="number-control">

                <button onclick="changeValue('failures',-1,1,10)">−</button>

                <span id="failures">3</span>

                <button onclick="changeValue('failures',1,1,10)">+</button>

            </div>

            <button class="generate-button" onclick="receiveMission()">

                GERAR MISSÃO

            </button>

        </div>

    </aside>

    <main id="missionView">

        <div class="welcome">

            <h1>EXAA</h1>

            <p>Aguardando geração de missão...</p>

        </div>

    </main>

</div>

<script src="database.js"></script>
<script src="script.js"></script>

</body>
</html>
