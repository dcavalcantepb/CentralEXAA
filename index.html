<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EXAA - Central Operacional</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

    <!-- ========================= -->
    <!-- SIDEBAR                   -->
    <!-- ========================= -->

    <aside id="sidebar" class="expanded">

        <div class="sidebar-header">

            <button id="sidebarToggle"
                    onclick="toggleSidebar()">

                ☰

            </button>

            <h2>EXAA</h2>

        </div>

        <div id="controlPanel">

            <h3>Configuração da Missão</h3>

            <label>Atos</label>

            <div class="number-control">

                <button onclick="changeValue('acts',-1,2,5)">
                    −
                </button>

                <span id="acts">3</span>

                <button onclick="changeValue('acts',1,2,5)">
                    +
                </button>

            </div>

            <label>Ameaças</label>

            <div class="number-control">

                <button onclick="changeValue('threats',-1,2,5)">
                    −
                </button>

                <span id="threats">2</span>

                <button onclick="changeValue('threats',1,2,5)">
                    +
                </button>

            </div>

            <label>Sucessos por Ato</label>

            <div class="number-control">

                <button onclick="changeValue('successes',-1,1,10)">
                    −
                </button>

                <span id="successes">5</span>

                <button onclick="changeValue('successes',1,1,10)">
                    +
                </button>

            </div>

            <label>Falhas por Ato</label>

            <div class="number-control">

                <button onclick="changeValue('failures',-1,1,10)">
                    −
                </button>

                <span id="failures">3</span>

                <button onclick="changeValue('failures',1,1,10)">
                    +
                </button>

            </div>

            <button id="generateMissionButton"
                    onclick="receiveMission()">

                GERAR MISSÃO

            </button>

            <button id="resetMissionButton"
                    onclick="resetMission()">

                NOVA MISSÃO

            </button>

        </div>

    </aside>

    <!-- ========================= -->
    <!-- TERMINAL                  -->
    <!-- ========================= -->

    <main id="terminal">

        <header id="terminalHeader">

            <h1>CENTRAL DO OPERADOR</h1>

        </header>

        <section id="missionView">

            <div class="welcome-screen">

                <h2>EXAA</h2>

                <p>

                    Configure a missão no painel lateral e pressione
                    <strong>GERAR MISSÃO</strong>.

                </p>

            </div>

        </section>

    </main>

</div>

<script src="./state.js"></script>
    
<script src="./database.js"></script>
<script src="./utils.js"></script>
<script src="./factories.js"></script>
<script src="./generator.js"></script>
<script src="./renderer.js"></script>
<script src="./ui.js"></script>
<script src="./script.js"></script>

</body>

</html>
