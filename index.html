<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EXAA - Central Operacional</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

    <!-- ========================= -->
    <!-- SIDEBAR                   -->
    <!-- ========================= -->

    <aside id="sidebar">

        <div class="sidebar-header">

            <button id="sidebarToggle">

                ☰

            </button>

            <h2>EXAA</h2>

        </div>

        <div id="controlPanel">

            <h3>Configuração da Missão</h3>

            <label>Atos</label>

            <div class="number-control">

                <button class="stepper" data-field="acts" data-step="-1" data-min="2" data-max="5">
                    −
                </button>

                <span id="acts">3</span>

                <button class="stepper" data-field="acts" data-step="1" data-min="2" data-max="5">
                    +
                </button>

            </div>

            <label>Ameaças</label>

            <div class="number-control">

                <button class="stepper" data-field="threats" data-step="-1" data-min="2" data-max="5">
                    −
                </button>

                <span id="threats">2</span>

                <button class="stepper" data-field="threats" data-step="1" data-min="2" data-max="5">
                    +
                </button>

            </div>

            <label>Sucessos por Ato</label>

            <div class="number-control">

                <button class="stepper" data-field="successes" data-step="-1" data-min="1" data-max="10">
                    −
                </button>

                <span id="successes">3</span>

                <button class="stepper" data-field="successes" data-step="1" data-min="1" data-max="10">
                    +
                </button>

            </div>

            <label>Falhas por Ato</label>

            <div class="number-control">

                <button class="stepper" data-field="failures" data-step="-1" data-min="1" data-max="10">
                    −
                </button>

                <span id="failures">3</span>

                <button class="stepper" data-field="failures" data-step="1" data-min="1" data-max="10">
                    +
                </button>

            </div>

            <button id="generateMissionButton">

                GERAR MISSÃO

            </button>

            <button id="resetMissionButton">

                NOVA MISSÃO

            </button>

        </div>

    </aside>

    <!-- ========================= -->
    <!-- TERMINAL                  -->
    <!-- ========================= -->

    <main id="terminal">

        <header id="terminalHeader">

            <h1>CENTRAL DO OPERADOR</h1>

            <p id="terminalStatus"></p>

        </header>

        <section id="missionView">

            <div class="welcome-screen">

                <h2>EXAA</h2>

                <p>

                    Configure a missão no painel lateral e pressione
                    <strong>GERAR MISSÃO</strong>.

                </p>

            </div>

        </section>

    </main>

</div>

<script type="module" src="./script.js"></script>

</body>

</html>
